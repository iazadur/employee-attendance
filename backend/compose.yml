services:
  backend:
    image: iazadur/attendance:latest
    container_name: attendance-backend
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    # Seed data will be run manually from host or a one-off container